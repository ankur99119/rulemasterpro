<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1e3a5f}
body{font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100dvh}
#toolbar{background:#1e3a5f;color:#fff;padding:16px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#back-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 8px;flex-shrink:0}
#title{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#canvas-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:#fff;display:flex;flex-direction:column;align-items:stretch}
#msg{color:#555;font-size:14px;padding:60px 20px;text-align:center;width:100%}
canvas{display:block;width:100% !important;height:auto !important}
#footer{background:#1e3a5f;padding:16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nav-btn{padding:12px 24px;border-radius:10px;border:none;background:rgba(255,255,255,0.18);color:#fff;font-size:14px;cursor:pointer;font-weight:700}
.nav-btn:disabled{opacity:0.3;cursor:default}
#counter{color:#fff;font-size:13px;text-align:center;font-weight:600}
</style>
</head>
<body>
<div id="toolbar">
  <button id="back-btn" onclick="history.back()">&#8592;</button>
  <span id="title">Loading...</span>
</div>
<div id="canvas-wrap"><div id="msg">Loading PDF...</div></div>
<div id="footer">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>&#8592; Prev</button>
  <span id="counter"></span>
  <button class="nav-btn" id="next-btn" onclick="changePage(1)" disabled>Next &#8594;</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const file   = params.get('file') || '';
const start  = parseInt(params.get('start')) || 1;
const end    = parseInt(params.get('end'))   || start;
const title  = params.get('title') || file.replace('.pdf','');

document.getElementById('title').textContent = decodeURIComponent(title);

let pdfDoc = null, curPage = start;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const pdfUrl = location.origin + location.pathname.replace('viewer.html','') + file;

pdfjsLib.getDocument({url: pdfUrl, withCredentials: false}).promise
  .then(function(doc){ pdfDoc = doc; renderPage(start); })
  .catch(function(e){ document.getElementById('msg').textContent = 'Error: ' + e.message; });

function renderPage(num) {
  const wrap = document.getElementById('canvas-wrap');
  wrap.innerHTML = '<div id="msg">Loading page ' + (num-start+1) + ' of ' + (end-start+1) + '...</div>';
  pdfDoc.getPage(num).then(function(page) {
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const W   = wrap.offsetWidth || window.innerWidth;
    const vp  = page.getViewport({scale: (W / page.getViewport({scale:1}).width) * DPR});
    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
    wrap.scrollTop = 0;
    page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise.then(function() {
      curPage = num;
      document.getElementById('counter').textContent = 'Page ' + (num-start+1) + ' of ' + (end-start+1);
      document.getElementById('prev-btn').disabled = num <= start;
      document.getElementById('next-btn').disabled = num >= end;
    });
  }).catch(function(e){
    wrap.innerHTML = '<div id="msg">Error: ' + e.message + '</div>';
  });
}

function changePage(d) {
  const n = curPage + d;
  if (n >= start && n <= end) renderPage(n);
}
</script>
</body>
</html>
