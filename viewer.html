<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1e3a5f}
body{font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;height:100dvh}
#toolbar{background:#1e3a5f;color:#fff;padding:0 18px;display:flex;align-items:center;gap:14px;flex:1;min-height:60px;border-bottom:1px solid rgba(255,255,255,0.1);}
#back-btn{background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:20px;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#back-btn:active{background:rgba(255,255,255,0.28)}
#title{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0.2px}
#subtitle{font-size:12px;opacity:0.65;margin-top:2px}
#canvas-wrap{flex-shrink:0;overflow:hidden;background:#fff;display:flex;align-items:stretch}
canvas{display:block;width:100% !important;height:auto !important}
#msg{color:#aac4e8;font-size:14px;padding:40px 20px;text-align:center;width:100%}
#footer{background:#1e3a5f;padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex:1;min-height:60px;border-top:1px solid rgba(255,255,255,0.1);}
.nav-btn{padding:12px 28px;border-radius:12px;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:15px;cursor:pointer;font-weight:700;letter-spacing:0.3px;transition:background 0.15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.nav-btn:active{background:rgba(255,255,255,0.28)}
.nav-btn:disabled{opacity:0.25;cursor:default}
#counter{color:#fff;font-size:14px;font-weight:600;text-align:center;opacity:0.9}
</style>
</head>
<body>
<div id="toolbar">
  <button id="back-btn" onclick="goBack()" ontouchend="event.preventDefault();goBack();">&#8592;</button>
  <div>
    <div id="title">Loading...</div>
    <div id="subtitle"></div>
  </div>
</div>
<div id="canvas-wrap"><div id="msg">Loading PDF...</div></div>
<div id="footer">
  <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" ontouchend="event.preventDefault();changePage(-1);" disabled>&#8592; Prev</button>
  <span id="counter"></span>
  <button class="nav-btn" id="next-btn" onclick="changePage(1)" ontouchend="event.preventDefault();changePage(1);" disabled>Next &#8594;</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const file   = params.get('file')  || '';
const start  = parseInt(params.get('start')) || 1;
const end    = parseInt(params.get('end'))   || start;
const title  = params.get('title') || file.replace('.pdf','');

// Viewer opens in same window now — history.back() always works
function goBack() {
  window.history.back();
}

// Title
const decoded = decodeURIComponent(title);
const parts   = decoded.split('\u00b7');
document.getElementById('title').textContent    = parts[0] ? parts[0].trim() : decoded;
document.getElementById('subtitle').textContent = parts[1] ? parts[1].trim() : '';

let pdfDoc = null, curPage = start;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const BASE = 'https://ankur99119.github.io/rulemasterpro/';
const pdfUrl = BASE + file;

pdfjsLib.getDocument({url:pdfUrl, withCredentials:false}).promise
  .then(function(doc){ pdfDoc=doc; renderPage(start); })
  .catch(function(e){ document.getElementById('msg').textContent='Error loading PDF: '+e.message; });

function renderPage(num) {
  const wrap = document.getElementById('canvas-wrap');
  wrap.innerHTML = '<div id="msg">Loading page '+(num-start+1)+' of '+(end-start+1)+'...</div>';
  pdfDoc.getPage(num).then(function(page) {
    const DPR = Math.min(window.devicePixelRatio||1, 2);
    const W   = window.innerWidth;
    const vp  = page.getViewport({scale:(W/page.getViewport({scale:1}).width)*DPR});
    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    wrap.innerHTML = '';
    wrap.appendChild(canvas);
    page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise.then(function() {
      curPage = num;
      document.getElementById('counter').textContent = 'Page '+(num-start+1)+' of '+(end-start+1);
      document.getElementById('prev-btn').disabled = (num <= start);
      document.getElementById('next-btn').disabled = (num >= end);
    });
  }).catch(function(e){
    wrap.innerHTML='<div id="msg">Error: '+e.message+'</div>';
  });
}

function changePage(d) {
  const n = curPage + d;
  if (n >= start && n <= end) renderPage(n);
}
</script>
</body>
</html>
